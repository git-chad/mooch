<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Confirm your mooch account</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f5f5f5; margin: 0; padding: 40px 20px; }
      .container { max-width: 480px; margin: 0 auto; background: #141414; border-radius: 16px; padding: 40px; border: 1px solid #2a2a2a; }
      .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 32px; }
      h1 { font-size: 22px; font-weight: 700; margin: 0 0 12px; }
      p { color: #888; line-height: 1.6; margin: 0 0 24px; font-size: 15px; }
      .btn { display: inline-block; background: #fff; color: #0a0a0a; font-weight: 700; font-size: 15px; text-decoration: none; padding: 14px 28px; border-radius: 10px; }
      .footer { margin-top: 32px; color: #555; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">mooch</div>
      <h1>Confirm your email</h1>
      <p>Click the button below to confirm your email address and finish setting up your account.</p>
      <a href="{{ .ConfirmationURL }}" class="btn">Confirm email</a>
      <div class="footer">
        <p>If you didn't sign up for mooch, you can safely ignore this email.</p>
      </div>
    </div>
  </body>
</html>
